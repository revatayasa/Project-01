    />

      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet" />
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet" />

    <!-- Custom Fonts Stylesheet - IMPORTANT: Load this AFTER style.css -->
    <link href="css/fonts.css" rel="stylesheet" />

    <style>
      .login-btn {
        background: #9a7b55;
        color: #fff;
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
      }

      .login-btn:hover {
        color: #fff;
        background: #7f6546;
      }
      
      .artikel-page-section {
        padding: 60px 0 80px;
      }

      .artikel-page-title {
        text-align: center;
        font-size: 3rem;
        font-weight: 700;
        color: #9a7b55;
        margin-bottom: 40px;
      }

      .artikel-list-wrapper {
        max-width: 1020px;
        margin: 0 auto;
      }

      .artikel-link {
        display: block;
        text-decoration: none;
        color: inherit;
      }

      .artikel-link:hover {
        text-decoration: none;
        color: inherit;
      }

      .artikel-item {
        background: #ffffff;
        border: 1px solid #d3d3d3;
        border-radius: 6px;
        padding: 14px;
        margin-bottom: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        cursor: pointer;
      }

      .artikel-item:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      }

      .artikel-thumb {
        width: 100%;
        height: 360px;
        object-fit: cover;
        display: block;
        border: 1px solid #d9d9d9;
      }

      .artikel-content {
        padding: 12px 6px 4px;
      }

      .artikel-content h5 {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 8px;
        color: #111;
      }

      .artikel-content p {
        margin-bottom: 0;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #8b6d4f;
      }

      .custom-pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        margin-top: 28px;
        flex-wrap: wrap;
      }

      .pagination-btn {
        min-width: 28px;
        height: 28px;
        border: none;
        border-radius: 4px;
        background-color: #9a7b55;
        color: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 10px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .pagination-btn:hover {
        background-color: #7f6546;
      }

      .pagination-btn.active {
        background-color: #6c5338;
      }

      .pagination-btn.disabled {
        opacity: 0.45;
        pointer-events: none;
      }

      @media (max-width: 768px) {
        .artikel-page-title {
          font-size: 2.2rem;
        }

        .artikel-thumb {
          height: 220px;
        }

        .artikel-content h5 {
          font-size: 1rem;
        }

        .artikel-content p {
          font-size: 0.88rem;
        }
      }
      
      .notif-link,
      .notif-link i,
      .notif-link::after {
        color: #9a7b55 !important;
      }

      .notif-link:hover,
      .notif-link:hover i,
      .notif-link:hover::after,
      .notif-link:focus,
      .notif-link:focus i,
      .notif-link:focus::after {
        color: #5b9bd5 !important;
      }
    </style>
  </head>

  <body>
    <div class="container-xxl bg-white p-0">
      <!-- Navbar Start -->
      <nav
        class="navbar navbar-expand-lg bg-white navbar-light sticky-top px-4 px-lg-5 py-lg-0"
      >
        <a href="index.html" class="navbar-brand">
          <div class="logo-container">
            <img
              src="assetkps/Logo/Logo Yayasan.png"
              alt="Vidya Parahita Foundation"
            />
            <img
              src="assetkps/Logo/LogoKasihParamitha.png"
              alt="Kasih Paramitha School"
            />
          </div>
        </a>

        <div class="nav-item dropdown">
          <a
            href="#"
            class="nav-link dropdown-toggle notif-link"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <i class="bi bi-bell"></i>
          </a>
          <div class="dropdown-menu rounded-0 rounded-bottom border-0 shadow-sm m-0">
            <a href="artikel.html" class="dropdown-item">Pengumuman</a>
          </div>
        </div>

        <button
          type="button"
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#navbarCollapse"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarCollapse">
          <div class="navbar-nav mx-auto">
            <a href="index.html" class="nav-item nav-link">Home</a>
            <a href="about.html" class="nav-item nav-link">About Us</a>
            <a href="classes.html" class="nav-item nav-link">Gallery</a>
            <div class="nav-item dropdown">
              <a
                href="facility.html"
                class="nav-link dropdown-toggle"
                data-bs-toggle="dropdown"
                >Program</a
              >
              <div
                class="dropdown-menu rounded-0 rounded-bottom border-0 shadow-sm m-0"
              >
                <a href="facility.html#school-section" class="dropdown-item"
                  >School</a
                >
                <a
                  href="facility.html#afterschool-section"
                  class="dropdown-item"
                  >After-School Programme</a
                >
              </div>
            </div>
            <a href="contact.html" class="nav-item nav-link">Contact Us</a>
            <a href="kalenderakademik.html" class="nav-item nav-link">Academic Calendar</a>
            <a href="testimonial.html" class="nav-item nav-link">Testimonies</a>
          </div>
          <a href="login/login.html" class="login-btn">Login</a>
        </div>
      </nav>
      <!-- Navbar End -->

      <!-- Artikel Page Start -->
      <div class="container artikel-page-section">
        <div class="artikel-list-wrapper">
          <h1 class="artikel-page-title">Our Event!</h1>

          <div id="artikelContainer"></div>
          <div id="pagination" class="custom-pagination"></div>
        </div>
      </div>
      <!-- Artikel Page End -->
    </div>

    <script>
      const articles = [
        {
          title: "Painting class",
          description:
            "Helping kids learn colors, textures, and worlds of wonder through the laughter and bright imagination of our young artists.",
          image: "img/artikel.jpg",
          link: "artikel_form.html?id=1"
        },
        {
          title: "Art Exploration Day",
          description:
            "Children explore creativity through guided painting activities and fun collaborative projects.",
          image: "img/artikel.jpg",
          link: "artikel_form.html?id=2"
        },
        {
          title: "Creative Canvas Session",
          description:
            "A joyful event where students express ideas and emotions through colors, shapes, and imagination.",
          image: "img/artikel.jpg",
          link: "artikel_form.html?id=3"
        },
        {
          title: "Little Artist Workshop",
          description:
            "Encouraging confidence, focus, and creativity through hands-on artistic activities.",
          image: "img/artikel.jpg",
          link: "artikel_form.html?id=4"
        },
        {
          title: "Fun With Colors",
          description:
            "Students learn basic color theory and composition in a playful classroom atmosphere.",
          image: "img/artikel.jpg",
          link: "artikel_form.html?id=5"
        },
        {
          title: "Young Painter Showcase",
          description:
            "A class event featuring the children's artwork and their unique visual storytelling.",
          image: "img/artikel.jpg",
          link: "artikel_form.html?id=6"
        },
        {
          title: "School Art Celebration",
          description:
            "Celebrating creativity and collaboration through school-wide art appreciation activities.",
          image: "img/artikel.jpg",
          link: "artikel_form.html?id=7"
        },
        {
          title: "Outdoor Sketch Activity",
          description:
            "Students observe the environment and turn their ideas into beautiful sketches and paintings.",
          image: "img/artikel.jpg",
          link: "artikel_form.html?id=8"
        }
      ];

      const itemsPerPage = 6;
      let currentPage = 1;

      function renderArticles() {
        const artikelContainer = document.getElementById("artikelContainer");
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedArticles = articles.slice(start, end);

        artikelContainer.innerHTML = paginatedArticles
          .map(
            (article) => `
              <a href="${article.link}" class="artikel-link">
                <div class="artikel-item">
                  <img src="${article.image}" alt="${article.title}" class="artikel-thumb" />
                  <div class="artikel-content">
                    <h5>${article.title}</h5>
                    <p>${article.description}</p>
                  </div>
                </div>
              </a>
            `
          )
          .join("");
      }

      function renderPagination() {
        const pagination = document.getElementById("pagination");
        const totalPages = Math.ceil(articles.length / itemsPerPage);

        let buttons = "";

        buttons += `
          <button class="pagination-btn ${currentPage === 1 ? "disabled" : ""}" onclick="changePage(${currentPage - 1})">
            &lt;
          </button>
        `;

        for (let i = 1; i <= totalPages; i++) {
          buttons += `
            <button class="pagination-btn ${currentPage === i ? "active" : ""}" onclick="changePage(${i})">
              ${i}
            </button>
          `;
        }

        buttons += `
          <button class="pagination-btn ${currentPage === totalPages ? "disabled" : ""}" onclick="changePage(${currentPage + 1})">
            &gt;
          </button>
        `;

        pagination.innerHTML = buttons;
      }

      function changePage(page) {
        const totalPages = Math.ceil(articles.length / itemsPerPage);
        if (page < 1 || page > totalPages) return;

        currentPage = page;
        renderArticles();
        renderPagination();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      renderArticles();
      renderPagination();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
