<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Kasih Paramitha School</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #1f1f1f;
      }

      .page-wrapper {
        min-height: 100vh;
        background: linear-gradient(
          to right,
          #f6bf00 0,
          #f6bf00 12%,
          #f5f5f5 12%,
          #f5f5f5 88%,
          #f6bf00 88%,
          #f6bf00 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .login-card {
        width: 100%;
        max-width: 430px;
        min-height: 540px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        padding: 42px 36px;
      }

      .logo-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 14px;
        margin-bottom: 50px;
      }

      .logo-wrap img {
        max-height: 34px;
        object-fit: contain;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-label {
        display: block;
        font-size: 12px;
        color: #8b7355;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .form-control {
        width: 100%;
        height: 42px;
        border: 1px solid #c9b8a0;
        border-radius: 4px;
        padding: 0 12px;
        outline: none;
        font-size: 14px;
        color: #333;
        transition: 0.2s ease;
        background: #fff;
      }

      .form-control:focus {
        border-color: #9a7b55;
        box-shadow: 0 0 0 3px rgba(154, 123, 85, 0.12);
      }

      .forgot-link {
        display: inline-block;
        margin-top: -4px;
        margin-bottom: 18px;
        font-size: 12px;
        color: #f0a22e;
        text-decoration: none;
      }

      .forgot-link:hover {
        text-decoration: underline;
      }

      .login-btn {
        width: 100%;
        height: 42px;
        border: none;
        border-radius: 4px;
        background: #9a7b55;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .login-btn:hover {
        background: #846748;
      }

      .bottom-text {
        text-align: center;
        margin-top: 28px;
        font-size: 12px;
        color: #8f8f8f;
      }

      .bottom-text a {
        color: #f0a22e;
        text-decoration: none;
        font-weight: 500;
      }

      .bottom-text a:hover {
        text-decoration: underline;
      }

      @media (max-width: 576px) {
        .page-wrapper {
          background: #f5f5f5;
          padding: 20px 16px;
        }

        .login-card {
          padding: 32px 22px;
          min-height: auto;
        }

        .logo-wrap {
          flex-wrap: wrap;
          margin-bottom: 36px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="login-card">
        <div class="logo-wrap">
          <img
            src="../assetkps/Logo/Logo Yayasan.png"
            alt="Vidya Parahita Foundation"
          />
          <img
            src="../assetkps/Logo/LogoKasihParamitha.png"
            alt="Kasih Paramitha School"
          />
        </div>

        <form>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder=""
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder=""
            />
          </div>

          <a href="#" class="forgot-link">Forgot password?</a>

          <button type="submit" class="login-btn">Login</button>

        </form>
      </div>
    </div>
  </body>
</html>
