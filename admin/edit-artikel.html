<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta content="" name="keywords" />
    <meta content="" name="description" />

    <!-- Favicon -->
    <link href="../img/favicon.ico" rel="icon" />

    <!-- Icon Font Stylesheet -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Libraries Stylesheet -->
    <link href="../lib/animate/animate.min.css" rel="stylesheet" />
    <link href="../lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="../css/bootstrap.min.css" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="../css/style.css" rel="stylesheet" />
    <link href="../css/fonts.css" rel="stylesheet" />

    <style>
      .login-btn {
        background: #9a7b55;
        color: #fff;
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
      }

      .login-btn:hover {
        color: #fff;
        background: #7f6546;
      }
      
      .article-admin-section {
        padding: 55px 0 80px;
        background: #ffffff;
        min-height: calc(100vh - 140px);
      }

      .article-admin-wrapper {
        max-width: 760px;
        margin: 0 auto;
      }

      .article-admin-title {
        text-align: center;
        font-size: 2.8rem;
        font-weight: 700;
        color: #9a7b55;
        margin-bottom: 45px;
      }

      .article-form .form-label {
        display: block;
        font-size: 1rem;
        font-weight: 500;
        color: #4a4a4a;
        margin-bottom: 10px;
      }

      .article-form .form-group {
        margin-bottom: 28px;
      }

      .article-form .form-control-custom,
      .article-form .form-textarea-custom {
        width: 100%;
        border: 1px solid #cfcfcf;
        border-radius: 4px;
        background: #fff;
        padding: 14px 16px;
        font-size: 1rem;
        color: #333;
        outline: none;
        transition: 0.2s ease;
      }

      .article-form .form-control-custom {
        height: 48px;
      }

      .article-form .form-textarea-custom {
        min-height: 240px;
        resize: vertical;
      }

      .article-form .form-control-custom:focus,
      .article-form .form-textarea-custom:focus {
        border-color: #9a7b55;
        box-shadow: 0 0 0 0.15rem rgba(154, 123, 85, 0.15);
      }

      .cover-upload-box {
        width: 100%;
        min-height: 210px;
        border: 1px solid #cfcfcf;
        border-radius: 4px;
        background: #fff;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cover-upload-box input[type="file"] {
        display: none;
      }

      .cover-upload-placeholder {
        text-align: center;
        color: #7d8693;
        padding: 20px;
      }

      .cover-upload-placeholder i {
        font-size: 2rem;
        margin-bottom: 8px;
        display: block;
      }

      .cover-upload-placeholder .main-text {
        font-size: 0.95rem;
        font-weight: 500;
        color: #5e6673;
        margin-bottom: 4px;
      }

      .cover-upload-placeholder .sub-text {
        font-size: 0.75rem;
        color: #8b8f97;
      }

      .cover-preview {
        width: 100%;
        height: 100%;
        min-height: 210px;
        object-fit: cover;
        display: none;
      }

      .publish-btn-wrap {
        text-align: center;
        margin-top: 8px;
      }

      .publish-btn {
        min-width: 130px;
        height: 42px;
        border: none;
        border-radius: 6px;
        background: #9a7b55;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        transition: 0.2s ease;
      }

      .publish-btn:hover {
        background: #7f6546;
      }

      @media (max-width: 768px) {
        .article-admin-section {
          padding: 40px 0 60px;
        }

        .article-admin-title {
          font-size: 2rem;
          margin-bottom: 30px;
        }

        .article-admin-wrapper {
          padding: 0 12px;
        }

        .cover-upload-box {
          min-height: 180px;
        }

        .cover-preview {
          min-height: 180px;
        }

        .article-form .form-textarea-custom {
          min-height: 200px;
        }
      }
      
      .notif-link,
      .notif-link i,
      .notif-link::after {
        color: #9a7b55 !important;
      }

      .notif-link:hover,
      .notif-link:hover i,
      .notif-link:hover::after,
      .notif-link:focus,
      .notif-link:focus i,
      .notif-link:focus::after {
        color: #5b9bd5 !important;
      }
    </style>
  </head>

  <body>
    <div class="container-xxl bg-white p-0">
      <!-- Spinner Start -->
      <div
        id="spinner"
        class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center"
      >
        <div
          class="spinner-border text-primary"
          style="width: 3rem; height: 3rem"
          role="status"
        >
          <span class="sr-only">Loading...</span>
        </div>
      </div>
      <!-- Spinner End -->

      <!-- Navbar Start -->
      <nav
        class="navbar navbar-expand-lg bg-white navbar-light sticky-top px-4 px-lg-5 py-lg-0"
      >
        <a href="../index.html" class="navbar-brand">
          <div class="logo-container">
            <img
              src="../assetkps/Logo/Logo Yayasan.png"
              alt="Vidya Parahita Foundation"
            />
            <img
              src="../assetkps/Logo/LogoKasihParamitha.png"
              alt="Kasih Paramitha School"
            />
          </div>
        </a>

        <div class="nav-item dropdown">
          <a
            href="#"
            class="nav-link dropdown-toggle notif-link"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <i class="bi bi-bell"></i>
          </a>
          <div class="dropdown-menu rounded-0 rounded-bottom border-0 shadow-sm m-0">
            <a href="../artikel.html" class="dropdown-item">Pengumuman</a>
          </div>
        </div>

        <button
          type="button"
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#navbarCollapse"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarCollapse">
          <div class="navbar-nav mx-auto">
            <a href="../index.html" class="nav-item nav-link">Home</a>
            <a href="../about.html" class="nav-item nav-link">About Us</a>
            <a href="../classes.html" class="nav-item nav-link">Gallery</a>

            <div class="nav-item dropdown">
              <a
                href="../facility.html"
                class="nav-link dropdown-toggle"
                data-bs-toggle="dropdown"
              >
                Program
              </a>
              <div
                class="dropdown-menu rounded-0 rounded-bottom border-0 shadow-sm m-0"
              >
                <a href="../facility.html#school-section" class="dropdown-item">
                  School
                </a>
                <a
                  href="../facility.html#afterschool-section"
                  class="dropdown-item"
                >
                  After-School Programme
                </a>
              </div>
            </div>

            <a href="../contact.html" class="nav-item nav-link">Contact Us</a>
            <a href="../kalenderakademik.html" class="nav-item nav-link">
              Academic Calendar
            </a>
            <a href="../testimonial.html" class="nav-item nav-link">
              Testimonials
            </a>
          </div>

          <a href="login/login.html" class="login-btn">Login</a>
          </a>
        </div>
      </nav>
      <!-- Navbar End -->

      <!-- Add Article Start -->
      <div class="container-fluid article-admin-section">
        <div class="container">
          <div class="article-admin-wrapper">
            <h1 class="article-admin-title">Edit Article</h1>

            <form class="article-form" id="articleForm" enctype="multipart/form-data">
              <div class="form-group">
                <label class="form-label" for="coverPhoto">Cover Photo</label>

                <label class="cover-upload-box" for="coverPhoto">
                  <input
                    type="file"
                    id="coverPhoto"
                    name="cover_photo"
                    accept=".jpg,.jpeg,.png"
                  />

                  <div class="cover-upload-placeholder" id="uploadPlaceholder">
                    <i class="bi bi-cloud-arrow-up"></i>
                    <div class="main-text">Click to upload photo</div>
                    <div class="sub-text">PNG or JPG (Max. 10 MB)</div>
                  </div>

                  <img
                    id="coverPreview"
                    class="cover-preview"
                    alt="Cover preview"
                  />
                </label>
              </div>

              <div class="form-group">
                <label class="form-label" for="title">Title</label>
                <input
                  type="text"
                  id="title"
                  name="title"
                  class="form-control-custom"
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="content">Content</label>
                <textarea
                  id="content"
                  name="content"
                  class="form-textarea-custom"
                ></textarea>
              </div>

              <div class="publish-btn-wrap">
                <button type="submit" class="publish-btn">Publish</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <!-- Add Article End -->

      <!-- Footer Start -->
      <div
        class="container-fluid bg-dark text-white-50 footer pt-5 mt-0 wow fadeIn"
        data-wow-delay="0.1s"
      >
        <div class="container">
          <div class="copyright">
            <div class="row">
              <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                &copy;
                <a class="border-bottom" href="#">Kasih Paramitha School</a>,
                All Rights Reserved. Designed By
                <a class="border-bottom" href="https://htmlcodex.com">
                  HTML Codex
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Footer End -->

      <!-- Back to Top -->
      <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top">
        <i class="bi bi-arrow-up"></i>
      </a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../lib/wow/wow.min.js"></script>
    <script src="../lib/easing/easing.min.js"></script>
    <script src="../lib/waypoints/waypoints.min.js"></script>
    <script src="../lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="../js/main.js"></script>

    <script>
      const coverPhotoInput = document.getElementById("coverPhoto");
      const coverPreview = document.getElementById("coverPreview");
      const uploadPlaceholder = document.getElementById("uploadPlaceholder");

      coverPhotoInput.addEventListener("change", function () {
        const file = this.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          coverPreview.src = e.target.result;
          coverPreview.style.display = "block";
          uploadPlaceholder.style.display = "none";
        };
        reader.readAsDataURL(file);
      });
    </script>
  </body>
</html>
