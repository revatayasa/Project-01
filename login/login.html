    <style>
      body {
        background: #f5f5f5;
        margin: 0;
        padding: 0;
      }

      /* ── Navbar overrides ── */
      .navbar.sticky-top {
        top: 0 !important;
        transition: none !important;
      }

      .notif-link,
      .notif-link i,
      .notif-link::after {
        color: #9a7b55 !important;
      }

      .notif-link:hover,
      .notif-link:hover i,
      .notif-link:hover::after,
      .notif-link:focus,
      .notif-link:focus i,
      .notif-link:focus::after {
        color: #5b9bd5 !important;
      }

      /* ── Login button ── */
      .login-btn {
        background: #9a7b55;
        color: #fff;
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
      }
      .login-btn:hover {
        color: #fff;
        background: #7f6546;
      }

      /* ── Login form only ── */
      .login-card,
      .login-card * {
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      /* ── Page body ── */
      .login-page-body {
        min-height: calc(100vh - 95px);
        background: linear-gradient(
          to right,
          #f6bf00 0,
          #f6bf00 12%,
          #f5f5f5 12%,
          #f5f5f5 88%,
          #f6bf00 88%,
          #f6bf00 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
      }

      /* ── Card ── */
      .login-card {
        width: 100%;
        max-width: 430px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        padding: 42px 36px;
      }

      .logo-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 14px;
        margin-bottom: 40px;
      }
      .logo-wrap img {
        max-height: 34px;
        object-fit: contain;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-label {
        display: block;
        font-size: 12px;
        color: #8b7355;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .form-control-login {
        width: 100%;
        height: 42px;
        border: 1px solid #c9b8a0;
        border-radius: 4px;
        padding: 0 12px;
        outline: none;
        font-size: 14px;
        color: #333;
        transition: 0.2s ease;
        background: #fff;
      }
      .form-control-login:focus {
        border-color: #9a7b55;
        box-shadow: 0 0 0 3px rgba(154, 123, 85, 0.12);
      }

      .forgot-link {
        display: inline-block;
        margin-top: -4px;
        margin-bottom: 18px;
        font-size: 12px;
        color: #f0a22e;
        text-decoration: none;
      }
      .forgot-link:hover {
        text-decoration: underline;
      }

      .login-submit-btn {
        width: 100%;
        height: 42px;
        border: none;
        border-radius: 4px;
        background: #9a7b55;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .login-submit-btn:hover:not(:disabled) {
        background: #846748;
      }
      .login-submit-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      /* Alerts */
      .alert-box {
        border-radius: 4px;
        padding: 10px 14px;
        font-size: 12px;
        margin-bottom: 16px;
        display: none;
      }
      .alert-box.show {
        display: block;
      }
      .alert-box.error {
        background: #fdecea;
        border: 1px solid #f5c6c6;
        color: #c62828;
      }
      .alert-box.success {
        background: #e8f5e9;
        border: 1px solid #c8e6c9;
        color: #2e7d32;
      }

      /* Spinner */
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }
      .spinner.show {
        display: block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 576px) {
        .login-page-body {
          background: #f5f5f5;
          padding: 30px 16px;
        }
        .login-card {
          padding: 32px 22px;
        }
        .logo-wrap {
          flex-wrap: wrap;
          margin-bottom: 28px;
        }
      }
    </style>
  </head>

      <button

        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav mx-auto">
          <a href="../index.html" class="nav-item nav-link active">Home</a>
          <a href="../about.html" class="nav-item nav-link">About Us</a>
          <a href="../classes.html" class="nav-item nav-link">Gallery</a>
          <div class="nav-item dropdown">
            <a
              href="../facility.html"
              class="nav-link dropdown-toggle"

              >Program</a
            >
            <div
              class="dropdown-menu rounded-0 rounded-bottom border-0 shadow-sm m-0"
            >
              <a href="../facility.html#school-section" class="dropdown-item"
                >School</a
              >
              <a
                href="../facility.html#afterschool-section"

                >After-School Programme</a

            </div>
          </div>
          <a href="../contact.html" class="nav-item nav-link">Contact Us</a>
          <a href="../kalenderakademik.html" class="nav-item nav-link"
            >Academic Calendar</a

          <a href="../testimonial.html" class="nav-item nav-link"

          <a href="../login/login.html" class="login-btn">Login</a>

    <!-- Login Body -->
    <div class="login-page-body">
      <div class="login-card">
        <div class="logo-wrap">
          <img
            src="../assetkps/Logo/Logo Yayasan.png"
            alt="Vidya Parahita Foundation"
          />
          <img
            src="../assetkps/Logo/LogoKasihParamitha.png"
            alt="Kasih Paramitha School"
          />
        </div>

        <div class="alert-box error" id="alertError"></div>
        <div class="alert-box success" id="alertSuccess"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input
              type="text"
              id="username"
              class="form-control-login"
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              type="password"
              id="password"
              class="form-control-login"
              autocomplete="current-password"
            />
          </div>

          <a href="#" class="forgot-link">Forgot password?</a>

          <button type="submit" class="login-submit-btn" id="loginBtn">
            <span id="btnText">Login</span>
            <div class="spinner" id="btnSpinner"></div>
          </button>
        </form>
      </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../lib/wow/wow.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/notif-bell.js"></script>

    <script>
      const SUPABASE_URL = window.__SUPABASE.URL;
      const SUPABASE_ANON = window.__SUPABASE.ANON;

      const form = document.getElementById("loginForm");
      const usernameInput = document.getElementById("username");
      const passInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const btnText = document.getElementById("btnText");
      const btnSpinner = document.getElementById("btnSpinner");
      const alertError = document.getElementById("alertError");
      const alertSuccess = document.getElementById("alertSuccess");

      function showError(msg) {
        alertError.textContent = msg;
        alertError.classList.add("show");
        alertSuccess.classList.remove("show");
      }

      function showSuccess(msg) {
        alertSuccess.textContent = msg;
        alertSuccess.classList.add("show");
        alertError.classList.remove("show");
      }

      function hideAlerts() {
        alertError.classList.remove("show");
        alertSuccess.classList.remove("show");
      }

      function setLoading(loading) {
        loginBtn.disabled = loading;
        btnText.textContent = loading ? "Logging in..." : "Login";
        loading
          ? btnSpinner.classList.add("show")
          : btnSpinner.classList.remove("show");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideAlerts();

        const username = usernameInput.value.trim();
        const password = passInput.value;

        if (!username) {
          showError("Username tidak boleh kosong.");
          usernameInput.focus();
          return;
        }
        if (!password) {
          showError("Password tidak boleh kosong.");
          passInput.focus();
          return;
        }

        setLoading(true);

        try {
          const res = await fetch(
            `${SUPABASE_URL}/functions/v1/CRUD/auth/login`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${SUPABASE_ANON}`,
              },
              body: JSON.stringify({ username, password }),
            },
          );

          const data = await res.json();

          if (!res.ok) {
            showError(data.error || "Login gagal. Coba lagi.");
            setLoading(false);
            return;
          }

          // Simpan ke localStorage
          localStorage.setItem("access_token", data.access_token);
          localStorage.setItem("refresh_token", data.refresh_token);
          localStorage.setItem("expires_at", String(data.expires_at));
          localStorage.setItem("user", JSON.stringify(data.user));
          localStorage.setItem("username", username);

          // Ambil role dari tabel users → roles via Supabase REST API (join)
          let userRole = "user"; // default
          try {
            const userId = data.user?.id;
            if (userId) {
              // Supabase REST API join: users + roles table via FK role_id
              // Join users + roles via FK role_id → roles.id
              const roleRes = await fetch(
                `${SUPABASE_URL}/rest/v1/users?id=eq.${userId}&select=role_id,roles!role_id(role_name)`,
                {
                  headers: {
                    "apikey": SUPABASE_ANON,
                    "Authorization": `Bearer ${data.access_token}`,
                    "Content-Type": "application/json",
                  },
                }
              );
              if (roleRes.ok) {
                const roleData = await roleRes.json();
                console.log("User role data:", roleData); // debug
                const row = roleData?.[0];
                if (row?.roles?.role_name) {
                  userRole = row.roles.role_name;
                }
              }
            }
          } catch (roleErr) {
            console.warn("Gagal ambil role:", roleErr);
          }

          localStorage.setItem("role", userRole);

          showSuccess("Login berhasil! Mengalihkan...");

          setTimeout(() => {
            window.location.href = "../home_user.html";
          }, 1000);
        } catch (err) {
          showError("Terjadi kesalahan. Periksa koneksi internet kamu.");
          console.error("Login error:", err);
          setLoading(false);
        }
      });
    </script>
