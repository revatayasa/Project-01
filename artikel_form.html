      .recommendation-box {

        padding: 28px 22px 36px;

      .recommendation-title {
        text-align: center;
        font-size: 40px;
        font-weight: 700;
        color: #9a7b55;
        margin-bottom: 25px;
      }

      .recommend-card {
        border: 1px solid #bcbcbc;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.18);
        border-radius: 4px;
        overflow: hidden;
        background: #fff;
        height: 100%;
        cursor: pointer;
        text-decoration: none;
        display: block;
      }

      .recommend-card img {
        width: 100%;
        height: 165px;
        object-fit: cover;
        display: block;
      }

      .recommend-card-placeholder {
        width: 100%;
        height: 165px;
        background: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: #aaa;
      }

      .recommend-card-body {
        padding: 10px 12px 12px;
      }

      .recommend-card-title {
        font-size: 14px;
        font-weight: 700;
        color: #000;
        margin-bottom: 4px;
        display: inline-block;
      }

      .recommend-card:hover .recommend-card-title {
        color: #9a7b55;
      }

      .recommend-card-desc {
        font-size: 11px;
        color: #222;
        line-height: 1.4;
        margin-bottom: 0;
      }

      .footer-space {
        height: 40px;
      }

      /* Loading skeleton */
      .skeleton {
        background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
        background-size: 200% 100%;
        animation: shimmer 1.2s infinite;
        border-radius: 4px;
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .error-state {
        text-align: center;
        padding: 80px 20px;
        color: #c62828;
      }

      @media (max-width: 991.98px) {
        .artikel-detail-section {
          padding: 30px 25px 40px;
        }
        .artikel-title {
          font-size: 36px;
        }
        .recommendation-title {
          font-size: 32px;
        }
        .artikel-hero img,
        .artikel-hero-placeholder {
          height: 300px;
        }
      }

      @media (max-width: 767.98px) {
        .artikel-title {
          font-size: 30px;
        }
        .recommendation-title {
          font-size: 28px;
        }
        .artikel-content {
          font-size: 14px;
        }
        .artikel-hero img,

      .notif-link,

      .notif-link::after {
        color: #9a7b55 !important;
      }

      .notif-link:hover i,

      .notif-link:focus,
      .notif-link:focus i,
      .notif-link:focus::after {

    <!-- JavaScript Libraries -->

    <script>
      const SUPABASE_URL = window.__SUPABASE.URL;
      const SUPABASE_ANON = window.__SUPABASE.ANON;

      function truncate(text, max) {
        const plain = text.replace(/<[^>]*>/g, "");
        return plain.length > max ? plain.substring(0, max) + "..." : plain;
      }

      function renderHero(imageUrl, title) {
        const hero = document.getElementById("artikelHero");
        const src = escapeHtml(imageUrl || "assetkps/Home/JAV_9935.jpg");
        hero.innerHTML = `<img src="${src}" alt="${escapeHtml(title)}" onerror="this.src='assetkps/Home/JAV_9935.jpg'" />`;
      }

      function renderArticle(article) {
        const title = article.title || "Untitled";
        const content = article.content || "<p>Tidak ada konten.</p>";

        document.title = `${title} - Kasih Paramitha School`;

        const titleEl = document.getElementById("artikelTitle");
        titleEl.classList.remove("skeleton");
        titleEl.style.minHeight = "";
        titleEl.style.maxWidth = "";
        titleEl.textContent = title;

        const contentEl = document.getElementById("artikelContent");
        contentEl.classList.remove("skeleton");
        // Render as HTML if content has tags, otherwise wrap in <p>
        if (/<[a-z][\s\S]*>/i.test(content)) {
          contentEl.innerHTML = content;
        } else {
          contentEl.innerHTML = content
            .split(/\n\n+/)
            .map((p) => `<p>${p.trim()}</p>`)
            .join("");
        }

        renderHero(article.image_link || "", title);
      }

      function renderRecommendations(articles, currentId) {
        const container = document.getElementById("recommendContainer");
        const others = articles
          .filter((a) => String(a.id) !== String(currentId))
          .slice(0, 3);

        if (others.length === 0) {
          container.innerHTML = `<div class="col-12 text-center text-muted py-3"><p>Tidak ada artikel lain.</p></div>`;
          return;
        }

        container.innerHTML = others
          .map((a) => {
            const title = a.title || "Untitled";
            const desc = truncate(a.content || "", 120);
            const recSrc = a.image_link || "assetkps/Home/JAV_9935.jpg";
            const img = `<img src="${recSrc}" alt="${title}" onerror="this.src='assetkps/Home/JAV_9935.jpg'" />`;

            return `
              <div class="col-md-4">
                <a href="artikel_form.html?id=${a.id}" class="recommend-card">
                  ${img}
                  <div class="recommend-card-body">
                    <span class="recommend-card-title">${title}</span>
                    <p class="recommend-card-desc">${desc}</p>
                  </div>
                </a>
              </div>`;
          })
          .join("");
      }

      async function loadPage() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          document.getElementById("artikelTitle").textContent = "Artikel tidak ditemukan.";
          document.getElementById("artikelContent").innerHTML = `<p>Tidak ada ID artikel yang diberikan. <a href="artikel.html">Kembali ke daftar artikel</a>.</p>`;
          document.getElementById("artikelHero").innerHTML = `<div class="artikel-hero-placeholder"><i class="bi bi-exclamation-circle"></i></div>`;
          return;
        }

        try {
          // Fetch all articles (to get current + recommendations in one request)
          const res = await fetch(`${SUPABASE_URL}/functions/v1/CRUD/articles`, {
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${SUPABASE_ANON}`,
            },
          });

          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const json = await res.json();
          const allArticles = json.data || [];

          const article = allArticles.find((a) => String(a.id) === String(id));

          if (!article) {
            document.getElementById("artikelTitle").textContent = "Artikel tidak ditemukan.";
            document.getElementById("artikelContent").innerHTML = `<p>Artikel dengan ID ini tidak ada. <a href="artikel.html">Kembali ke daftar artikel</a>.</p>`;
            document.getElementById("artikelHero").innerHTML = `<div class="artikel-hero-placeholder"><i class="bi bi-exclamation-circle"></i></div>`;
            return;
          }

          renderArticle(article);
          renderRecommendations(allArticles, id);
        } catch (err) {
          document.getElementById("artikelTitle").textContent = "Gagal memuat artikel.";
          document.getElementById("artikelContent").innerHTML = `<p>Terjadi kesalahan. Coba lagi nanti.</p>`;
          console.error("Load error:", err);
        }
      }

      document.addEventListener("DOMContentLoaded", loadPage);
    </script>
